<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iStatis AI Assistant</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 700px;
      height: 90vh;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      background: #1a472a;
      color: white;
      padding: 20px 24px;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 600;
    }

    .header p {
      font-size: 13px;
      opacity: 0.8;
      margin-top: 4px;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
    }

    .message.user {
      background: #1a472a;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .message.assistant {
      background: #f0f0f0;
      color: #333;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .message.thinking {
      background: #f0f0f0;
      color: #999;
      align-self: flex-start;
      font-style: italic;
    }

    .input-area {
      padding: 16px 20px;
      border-top: 1px solid #eee;
      display: flex;
      gap: 10px;
    }

    input[type="text"] {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: #1a472a;
    }

    button {
      padding: 12px 20px;
      background: #1a472a;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover {
      background: #2d6a4f;
    }

    button:disabled {
      background: #999;
      cursor: not-allowed;
    }

    .suggestions {
      padding: 0 20px 16px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .suggestion {
      padding: 6px 12px;
      background: #f0f7f4;
      border: 1px solid #1a472a;
      color: #1a472a;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .suggestion:hover {
      background: #1a472a;
      color: white;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>iStatis Assistant</h1>
      <p>Ask about products, pricing, and bulk orders</p>
    </div>

    <div class="messages" id="messages">
      <div class="message assistant">
        Hello! I'm the iStatis sales assistant. I can help you with
        product information, pricing, and bulk order quotes. How can I help you today?
      </div>
    </div>

    <div class="suggestions">
      <span class="suggestion" onclick="sendSuggestion(this)">C4 envelope pricing</span>
      <span class="suggestion" onclick="sendSuggestion(this)">Bulk paper order</span>
      <span class="suggestion" onclick="sendSuggestion(this)">File carriers for hospital</span>
      <span class="suggestion" onclick="sendSuggestion(this)">Compare envelope sizes</span>
    </div>

    <div class="input-area">
      <input type="text" id="input" placeholder="Ask about products or pricing..."
        onkeypress="if(event.key==='Enter') sendMessage()">
      <button onclick="sendMessage()" id="sendBtn">Send</button>
    </div>
  </div>

  <script>
    // Generate a simple session ID for this browser session
    const sessionId = 'session_' + Math.random().toString(36).substr(2, 9);

    function addMessage(text, role) {
      const messages = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = `message ${role}`;
      div.textContent = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
      return div;
    }

    async function sendMessage() {
      const input = document.getElementById('input');
      const btn = document.getElementById('sendBtn');
      const message = input.value.trim();
      if (!message) return;

      // Show user message
      addMessage(message, 'user');
      input.value = '';
      btn.disabled = true;

      // Show thinking indicator
      const thinking = addMessage('Thinking...', 'thinking');

      try {
        const response = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message, session_id: sessionId })
        });

        const data = await response.json();
        thinking.remove();
        addMessage(data.response, 'assistant');
      } catch (error) {
        thinking.remove();
        addMessage('Sorry, something went wrong. Please try again.', 'assistant');
      }

      btn.disabled = false;
      input.focus();
    }

    function sendSuggestion(el) {
      document.getElementById('input').value = el.textContent;
      sendMessage();
    }
  </script>
</body>

</html>
